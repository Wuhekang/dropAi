server:
  port: 8080

spring:
  application:
    name: academic-rewrite-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/drop_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  poi:
    min-inflate-ratio: ${POI_MIN_INFLATE_RATIO:0.001}
  epay:
    gateway: ${EPAY_GATEWAY:http://dropai-demo.cn/submit.php}
    pid: ${EPAY_PID:1000}
    key: ${EPAY_KEY:sC5ZS5q2zc8ZMI2WdcZ84sFMs7QfQCeg}
    base-url: ${APP_BASE_URL:http://dropai-demo.com}
    notify-url: ${EPAY_NOTIFY_URL:http://dropai-demo.com/api/recharge/notify}
    return-url: ${EPAY_RETURN_URL:http://dropai-demo.com/recharge/result}
    site-name: ${EPAY_SITE_NAME:DropAI}
    default-type: ${EPAY_DEFAULT_TYPE:alipay}

ai:
  doubao:
    enabled: true
    api-key: ${DOUBAO_API_KEY:}
    endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${DOUBAO_MODEL:doubao-seed-2-0-lite-260428}
    temperature: 0.35
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    document-concurrency: 64
  matrix-design:
    enabled: ${MATRIX_DESIGN_ENABLED:true}
    api-key: ${MATRIX_API_KEY:${OPENAI_API_KEY:}}
    endpoint: https://www.aikeys.me/v1/chat/completions
    model: ${MATRIX_MODEL:claude-opus-4-7}
    connect-timeout-seconds: 15
    read-timeout-seconds: 180
