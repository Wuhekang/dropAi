server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: academic-rewrite-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/drop_ai?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  poi:
    min-inflate-ratio: ${POI_MIN_INFLATE_RATIO:0.001}
  epay:
    gateway: ${EPAY_GATEWAY:https://droapi.k8818.cn/submit.php}
    pid: ${EPAY_PID:1000}
    key: ${EPAY_KEY:T451e2G86pJlG2tcePGe41jpzMprQ14b}
    base-url: ${APP_BASE_URL:https://dro.k8818.cn}
    notify-url: ${EPAY_NOTIFY_URL:https://dro.k8818.cn/api/recharge/notify}
    return-url: ${EPAY_RETURN_URL:https://dro.k8818.cn/recharge}
    site-name: ${EPAY_SITE_NAME:DropAI}
    default-type: ${EPAY_DEFAULT_TYPE:alipay}

cad:
  worker:
    enabled: ${CAD_WORKER_ENABLED:true}
    script: ${CAD_WORKER_SCRIPT:}
    python: ${CAD_WORKER_PYTHON:python}
    work-dir: ${CAD_WORKER_WORK_DIR:}
    timeout-seconds: ${CAD_WORKER_TIMEOUT_SECONDS:240}
    engine: ${CAD_WORKER_ENGINE:cadquery}

ai:
  doubao:
    enabled: ${DOUBAO_ENABLED:true}
    api-key: ${DOUBAO_API_KEY:}
    base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
    responses-path: ${DOUBAO_RESPONSES_PATH:/responses}
    chat-path: ${DOUBAO_CHAT_PATH:/chat/completions}
    endpoint: ${DOUBAO_ENDPOINT:${ai.doubao.base-url}${ai.doubao.chat-path}}
    model: ${DOUBAO_MODEL:doubao-seed-2-1-turbo-260628}
    text-model: ${DOUBAO_TEXT_MODEL:${DOUBAO_MODEL:doubao-seed-2-1-turbo-260628}}
    review-model: ${DOUBAO_REVIEW_MODEL:doubao-seed-2-1-pro-260628}
    fallback-model: ${DOUBAO_FALLBACK_MODEL:doubao-seed-2-0-lite-260428}
    vision-model: ${DOUBAO_VISION_MODEL:}
    mechanical-vision-model: ${DOUBAO_MECHANICAL_VISION_MODEL:doubao-seed-2-1-turbo-260628}
    web-search-enabled: ${DOUBAO_WEB_SEARCH_ENABLED:false}
    web-search-model: ${DOUBAO_WEB_SEARCH_MODEL:doubao-seed-2-1-turbo-260628}
    responses-base-url: ${DOUBAO_RESPONSES_BASE_URL:${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}}
    web-search-force: ${DOUBAO_WEB_SEARCH_FORCE:true}
    web-search-timeout-seconds: ${DOUBAO_WEB_SEARCH_TIMEOUT_SECONDS:60}
    web-search-max-results: ${DOUBAO_WEB_SEARCH_MAX_RESULTS:30}
    web-search-retry-count: ${DOUBAO_WEB_SEARCH_RETRY_COUNT:2}
    web-search-max-queries: ${DOUBAO_WEB_SEARCH_MAX_QUERIES:12}
    temperature: 0.35
    connect-timeout-seconds: ${DOUBAO_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${DOUBAO_TIMEOUT_SECONDS:120}
    max-retries: ${DOUBAO_MAX_RETRIES:2}
    max-output-tokens: ${DOUBAO_MAX_OUTPUT_TOKENS:8192}
    debug: ${DOUBAO_DEBUG:false}
    document-concurrency: 64

writing:
  max-retry: ${WRITING_MAX_RETRY:3}
  chapter-timeout-seconds: ${WRITING_CHAPTER_TIMEOUT:180}
  reference-search:
    enabled: ${WRITING_REFERENCE_SEARCH_ENABLED:true}
    provider: ${WRITING_REFERENCE_SEARCH_PROVIDER:doubao_web}
    max-results: ${WRITING_REFERENCE_SEARCH_MAX_RESULTS:30}
    timeout-seconds: ${WRITING_REFERENCE_SEARCH_TIMEOUT_SECONDS:30}
    retry-count: ${WRITING_REFERENCE_SEARCH_RETRY_COUNT:3}

reference:
  openalex:
    enabled: ${OPENALEX_SEARCH_ENABLED:false}
    api-key: ${OPENALEX_API_KEY:}
  crossref:
    enabled: ${CROSSREF_SEARCH_ENABLED:false}
    mailto: ${CROSSREF_MAILTO:}
    api-token: ${CROSSREF_API_TOKEN:}
