server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

ai:
  doubao:
    enabled: true
    api-key: ${DOUBAO_API_KEY:}
    endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${DOUBAO_MODEL:doubao-seed-2-0-lite-260428}
    temperature: 0.35
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    document-concurrency: ${DOUBAO_DOCUMENT_CONCURRENCY:8}

auth:
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    redirect-uri: ${WECHAT_REDIRECT_URI:}
    frontend-success-uri: ${WECHAT_FRONTEND_SUCCESS_URI:/login}
