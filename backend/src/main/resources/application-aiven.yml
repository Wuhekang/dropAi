server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 10000
      validation-timeout: 3000
      initialization-fail-timeout: -1
      keepalive-time: 30000
  sql:
    init:
      # Aiven schema is persistent. Re-running DDL on every Render restart makes
      # a temporary database/network issue fatal to the whole web service.
      mode: never
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  poi:
    min-inflate-ratio: ${POI_MIN_INFLATE_RATIO:0.001}

ai:
  doubao:
    enabled: true
    api-key: ${DOUBAO_API_KEY:}
    endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${DOUBAO_MODEL:doubao-seed-2-0-lite-260428}
    temperature: 0.35
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    document-concurrency: ${DOUBAO_DOCUMENT_CONCURRENCY:32}
  matrix-design:
    enabled: ${MATRIX_DESIGN_ENABLED:true}
    api-key: ${MATRIX_API_KEY:${OPENAI_API_KEY:}}
    endpoint: https://www.aikeys.me/v1/chat/completions
    model: ${MATRIX_MODEL:claude-opus-4-7}
    connect-timeout-seconds: 15
    read-timeout-seconds: 180
