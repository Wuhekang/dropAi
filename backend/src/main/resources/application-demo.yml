server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${APP_DATA_DIR:/app/data}/drop_ai;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  h2:
    console:
      enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

ai:
  doubao:
    enabled: true
    api-key: ${DOUBAO_API_KEY:}
    endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${DOUBAO_MODEL:doubao-seed-2-0-lite-260428}
    temperature: 0.35
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    document-concurrency: ${DOUBAO_DOCUMENT_CONCURRENCY:32}
  openai-design:
    enabled: ${OPENAI_DESIGN_ENABLED:true}
    api-key: ${OPENAI_API_KEY:}
    endpoint: ${OPENAI_ENDPOINT:https://api.openai.com/v1/responses}
    model: ${OPENAI_MODEL:gpt-5.4-mini}
    connect-timeout-seconds: 15
    read-timeout-seconds: 180
