services:
  - type: web
    name: dropai-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: aiven
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://dropai-mysql-dropai-production.c.aivencloud.com:21940/defaultdb?sslMode=REQUIRED&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: DOUBAO_MODEL
        value: doubao-seed-2-0-lite-260428
      - key: DOUBAO_ENDPOINT
        value: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      - key: DOUBAO_API_KEY
        sync: false
      - key: MATRIX_API_KEY
        sync: false
      - key: MATRIX_MODEL
        value: claude-opus-4-7
      - key: DOUBAO_DOCUMENT_CONCURRENCY
        value: 32
      - key: APP_BASE_URL
        value: https://dropai-demo.onrender.com
      - key: EPAY_GATEWAY
        sync: false
      - key: EPAY_PID
        sync: false
      - key: EPAY_KEY
        sync: false
      - key: EPAY_SITE_NAME
        value: DropAI
      - key: EPAY_DEFAULT_TYPE
        value: alipay
