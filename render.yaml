services:
  - type: web
    name: dropai-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: DOUBAO_MODEL
        value: doubao-seed-2-0-lite-260428
      - key: DOUBAO_ENDPOINT
        value: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      - key: DOUBAO_API_KEY
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: WECHAT_REDIRECT_URI
        value: https://dropai-demo.onrender.com/api/auth/wechat/callback
      - key: WECHAT_FRONTEND_SUCCESS_URI
        value: https://dropai-demo.onrender.com/login
