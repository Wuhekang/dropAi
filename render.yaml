services:
  - type: web
    name: dropai-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: aiven
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://dropai-mysql-dropai-production.c.aivencloud.com:21940/defaultdb?sslMode=REQUIRED&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: DOUBAO_MODEL
        value: doubao-seed-2-0-lite-260428
      - key: DOUBAO_TEXT_MODEL
        value: doubao-seed-2-0-lite-260428
      - key: DOUBAO_MECHANICAL_VISION_MODEL
        value: doubao-seed-2-1-turbo-260628
      - key: DOUBAO_ENDPOINT
        value: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      - key: DOUBAO_API_KEY
        sync: false
      - key: DOUBAO_DOCUMENT_CONCURRENCY
        value: 32
      - key: DOUBAO_WEB_SEARCH_ENABLED
        value: true
      - key: DOUBAO_MAX_RETRIES
        value: 2
      - key: WRITING_REFERENCE_SEARCH_ENABLED
        value: true
      - key: WRITING_REFERENCE_SEARCH_PROVIDER
        value: doubao,openalex,crossref
      - key: WRITING_REFERENCE_SEARCH_MAX_RESULTS
        value: 30
      - key: WRITING_REFERENCE_SEARCH_TIMEOUT_SECONDS
        value: 30
      - key: WRITING_REFERENCE_SEARCH_RETRY_COUNT
        value: 3
      - key: WRITING_MAX_RETRY
        value: 3
      - key: WRITING_CHAPTER_TIMEOUT
        value: 180
      - key: CAD_WORKER_ENABLED
        value: true
      - key: CAD_WORKER_PYTHON
        value: /opt/dropai-cad-venv/bin/python
      - key: CAD_WORKER_SCRIPT
        value: /app/cad_worker/cad_worker.py
      - key: CAD_WORKER_WORK_DIR
        value: /tmp/dropai-cad-worker
      - key: CAD_WORKER_TIMEOUT_SECONDS
        value: 300
      - key: APP_BASE_URL
        value: https://dro.k8818.cn
      - key: EPAY_GATEWAY
        sync: false
      - key: EPAY_PID
        sync: false
      - key: EPAY_KEY
        sync: false
      - key: EPAY_NOTIFY_URL
        value: https://dro.k8818.cn/api/recharge/notify
      - key: EPAY_RETURN_URL
        value: https://dro.k8818.cn/recharge
      - key: EPAY_SITE_NAME
        value: DropAI
      - key: EPAY_DEFAULT_TYPE
        value: alipay
